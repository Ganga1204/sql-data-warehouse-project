name: dbt CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    name: Validate and Test dbt Models

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "TestPassword123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd="exit 0"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # BUG #1 (root cause of every red X so far): the workflow called
      # /opt/mssql-tools18/bin/sqlcmd on every step, but that binary is
      # never installed on the GitHub Actions runner itself -- the
      # "services:" container only runs the SQL Server *engine*, it does
      # not give the runner host a sqlcmd client. This step installs it.
      - name: Install SQL Server command-line tools + ODBC driver
        run: |
          sudo curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev msodbcsql18
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      - name: Wait for SQL Server to accept connections
        run: |
          for i in $(seq 1 30); do
            if sqlcmd -C -S localhost -U sa -P "TestPassword123!" -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL Server is up"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 3
          done
          echo "::error::SQL Server never became reachable"
          exit 1

      - name: Install dbt + SQL Server adapter
        run: pip install dbt-core dbt-sqlserver

      # BUG #2: scripts/bronze/*.sql and scripts/silver/*.sql silently
      # matched the WRONG files. Your actual filenames are:
      #   scripts/bronze/ddl_bronze.SQL          <- uppercase .SQL
      #   scripts/bronze/proc_load_bronze.SQL    <- uppercase .SQL
      #   scripts/silver/ddl_silver              <- no extension at all
      #   scripts/silver/proc_load_silver.sql    <- lowercase .sql
      # Linux is case-sensitive, so a lowercase "*.sql" glob matched NONE
      # of the bronze files and only ONE of the two silver files (missing
      # the table definitions in ddl_silver entirely). We now find files
      # by name explicitly, case-insensitively, and run ddl before proc.
      #
      # BUG #3: sqlcmd's -i flag does not accept a space-separated list of
      # files the way a bash glob expands one -- each file must be passed
      # in its own sqlcmd invocation, which this loop now does.
      - name: Load Bronze + Silver + Gold layers into test DB
        run: |
          set -e
          sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d master -i scripts/init_database.sql

          for f in $(find scripts/bronze -iname "ddl_*" | sort) \
                   $(find scripts/bronze -iname "proc_*" | sort); do
            echo "Running $f ..."
            sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d DataWarehouse -i "$f"
          done

          for f in $(find scripts/silver -iname "ddl_*" | sort) \
                   $(find scripts/silver -iname "proc_*" | sort); do
            echo "Running $f ..."
            sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d DataWarehouse -i "$f"
          done

          # Execute the stored procedures that actually load the data
          sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d DataWarehouse -Q "EXEC bronze.load_bronze;"
          sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d DataWarehouse -Q "EXEC silver.load_silver;"

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_warehouse:
            target: ci
            outputs:
              ci:
                type: sqlserver
                driver: "ODBC Driver 18 for SQL Server"
                server: localhost
                port: 1433
                database: DataWarehouse
                schema: dbo
                user: sa
                password: "TestPassword123!"
                trust_cert: true
          EOF

      - name: dbt run (build Gold layer marts)
        run: dbt run --profiles-dir ~/.dbt

      - name: dbt test (staging + marts schema tests)
        run: dbt test --profiles-dir ~/.dbt

      - name: Run manual quality-check scripts (expect 0 rows)
        run: |
          for f in tests/quality_checks_silver.sql tests/quality_check_gold.sql; do
            echo "Running $f ..."
            rows=$(sqlcmd -C -S localhost -U sa -P "TestPassword123!" -d DataWarehouse -i "$f" -h -1 | grep -v '^$' | wc -l)
            if [ "$rows" -gt 0 ]; then
              echo "::error::$f returned $rows unexpected row(s)"
              exit 1
            fi
          done
